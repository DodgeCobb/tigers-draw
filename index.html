<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helensburgh Tigers – 2026 Draw Tracker</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f6f9; color: #1a1a2e; font-size: 14px; }

    header { background: #1a1a2e; color: #fff; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.3px; }
    header h1 span { color: #f0a500; }
    #last-updated { font-size: 11px; color: #aaa; margin-top: 2px; }

    .tabs { display: flex; gap: 0; background: #fff; border-bottom: 2px solid #e0e0e0; overflow-x: auto; }
    .tab-btn { padding: 10px 16px; border: none; background: none; font-size: 12px; font-weight: 600; color: #666; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
    .tab-btn:hover { color: #1a1a2e; background: #f9f9f9; }
    .tab-btn.active { color: #1a1a2e; border-bottom-color: #f0a500; }

    .tab-content { display: none; padding: 16px 20px; }
    .tab-content.active { display: block; }

    .record-bar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
    .record-pill { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .pill-w  { background: #d4edda; color: #155724; }
    .pill-l  { background: #f8d7da; color: #721c24; }
    .pill-d  { background: #fff3cd; color: #856404; }
    .pill-p  { background: #cce5ff; color: #004085; }
    .pill-wo { background: #d1ecf1; color: #0c5460; }
    .pill-ff { background: #e2e3e5; color: #383d41; }
    .pill-bye{ background: #e2e3e5; color: #383d41; }
    .next-label { font-size: 11px; color: #888; margin-left: auto; }

    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    thead tr { background: #1a1a2e; color: #fff; }
    th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; font-size: 12px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }

    .result-badge { display: inline-block; width: 22px; height: 22px; line-height: 22px; text-align: center; border-radius: 4px; font-size: 11px; font-weight: 700; }
    .badge-w   { background: #d4edda; color: #155724; }
    .badge-l   { background: #f8d7da; color: #721c24; }
    .badge-d   { background: #fff3cd; color: #856404; }
    .badge-ff  { background: #e2e3e5; color: #383d41; }
    .badge-wo  { display:inline-block; background: #d1ecf1; color: #0c5460; font-size: 9px; font-weight:700; padding: 2px 6px; border-radius:4px; }

    .score-cell { font-weight: 700; font-size: 13px; }
    .score-win  { color: #155724; }
    .score-loss { color: #721c24; }
    .score-draw { color: #856404; }

    tr.row-next { background: #fffbec; }
    tr.row-next td { border-left: 3px solid #f0a500; }
    tr.row-next td:first-child { padding-left: 9px; }
    tr.row-bye { background: #fafafa; }
    tr.row-bye td { color: #aaa; font-style: italic; }

    .ha-badge { display: inline-block; width: 18px; height: 18px; line-height: 18px; text-align: center; border-radius: 3px; font-size: 10px; font-weight: 700; }
    .ha-h { background: #cce5ff; color: #004085; }
    .ha-a { background: #e2e3e5; color: #383d41; }

    .next-tag { display: inline-block; background: #f0a500; color: #fff; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 10px; margin-left: 6px; vertical-align: middle; text-transform: uppercase; }

    /* Team badge pills */
    .team-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; white-space: nowrap; }
    .team-harrigan { background: #1a1a2e; color: #f0a500; }
    .team-women    { background: #f8d7e8; color: #8b1a4a; }
    .team-u18      { background: #fff3cd; color: #856404; }
    .team-ollt1    { background: #cce5ff; color: #004085; }
    .team-ollt2    { background: #d4edda; color: #155724; }

    /* Calendar date group header */
    .cal-date-header { background: #eef0f4; }
    .cal-date-header td { font-weight: 700; font-size: 12px; color: #444; padding: 6px 12px; border-bottom: 2px solid #d0d4dc; }

    .loading { text-align: center; padding: 40px; color: #888; font-size: 13px; }
    .error-msg { background: #f8d7da; color: #721c24; padding: 12px 16px; border-radius: 6px; margin: 16px 20px; font-size: 12px; }

    @media (max-width: 600px) {
      th.hide-mobile, td.hide-mobile { display: none; }
      td, th { padding: 7px 8px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Helensburgh Tigers &mdash; <span>2026 Draw Tracker</span></h1>
    <div id="last-updated">Loading…</div>
  </div>
</header>

<div class="tabs" id="tabs">
  <button class="tab-btn active" onclick="showTab('calendar', this)">📅 All Teams</button>
  <button class="tab-btn" onclick="showTab('harrigan', this)">🏆 Harrigan Plate</button>
  <button class="tab-btn" onclick="showTab('women', this)">👩 Open Women</button>
  <button class="tab-btn" onclick="showTab('u18', this)">🟡 U18 Gold</button>
  <button class="tab-btn" onclick="showTab('ollt1', this)">🔵 OLLT Div 1</button>
  <button class="tab-btn" onclick="showTab('ollt2', this)">🟢 OLLT Div 2</button>
</div>

<div id="tab-calendar" class="tab-content active">
  <div class="loading">Loading draw data…</div>
</div>
<div id="tab-harrigan" class="tab-content"></div>
<div id="tab-women"    class="tab-content"></div>
<div id="tab-u18"      class="tab-content"></div>
<div id="tab-ollt1"    class="tab-content"></div>
<div id="tab-ollt2"    class="tab-content"></div>

<script>
  // ── Tab switching ──────────────────────────────────────────────────
  function showTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    if (btn) btn.classList.add('active');
  }

  // ── HTML helpers ───────────────────────────────────────────────────
  function haBadge(ha) {
    return `<span class="ha-badge ha-${ha.toLowerCase()}">${ha}</span>`;
  }

  function resultBadge(res) {
    if (!res) return '—';
    if (res === 'W')  return '<span class="result-badge badge-w">W</span>';
    if (res === 'L')  return '<span class="result-badge badge-l">L</span>';
    if (res === 'D')  return '<span class="result-badge badge-d">D</span>';
    if (res === 'FF') return '<span class="result-badge badge-ff">FF</span>';
    if (res === 'WO') return '<span class="badge-wo">WO</span>';
    return '—';
  }

  function scoreCell(score, res) {
    if (!score) return '—';
    const cls = res === 'W' ? 'score-win' : res === 'L' ? 'score-loss' : res === 'D' ? 'score-draw' : '';
    return `<span class="score-cell ${cls}">${score}</span>`;
  }

  // ── Insert BYEs for missing round numbers ──────────────────────────
  function insertByes(matches) {
    if (!matches.length) return matches;
    const result = [];
    for (let i = 0; i < matches.length; i++) {
      if (i > 0) {
        const prev = matches[i - 1].rnd;
        const curr = matches[i].rnd;
        for (let r = prev + 1; r < curr; r++) {
          result.push({ rnd: r, bye: true });
        }
      }
      result.push(matches[i]);
    }
    return result;
  }

  // ── Find the first upcoming (no result) match ──────────────────────
  function findNextKey(allMatches) {
    const upcoming = allMatches.filter(m => !m.bye && !m.res);
    if (!upcoming.length) return null;
    upcoming.sort((a, b) => a.sortKey.localeCompare(b.sortKey));
    return upcoming[0].sortKey + '_' + upcoming[0].opp;
  }

  // ── Build record pills ─────────────────────────────────────────────
  function buildRecordBar(matches, nextInfo) {
    let w = 0, l = 0, d = 0, wo = 0, ff = 0;
    let pending = 0;
    for (const m of matches) {
      if (m.bye) continue;
      if (m.res === 'W') w++;
      else if (m.res === 'L') l++;
      else if (m.res === 'D') d++;
      else if (m.res === 'WO') wo++;
      else if (m.res === 'FF') ff++;
      else pending++;
    }
    let html = '';
    if (w)  html += `<span class="record-pill pill-w">W ${w}</span>`;
    if (l)  html += `<span class="record-pill pill-l">L ${l}</span>`;
    if (d)  html += `<span class="record-pill pill-d">D ${d}</span>`;
    if (wo) html += `<span class="record-pill pill-wo">WO ${wo}</span>`;
    if (ff) html += `<span class="record-pill pill-ff">FF ${ff}</span>`;
    if (pending === 0) {
      html += `<span class="record-pill pill-bye">Season complete</span>`;
    } else {
      html += `<span class="record-pill pill-p">P ${pending} remaining</span>`;
    }
    if (nextInfo) {
      html += `<span class="next-label">${nextInfo}</span>`;
    }
    return `<div class="record-bar">${html}</div>`;
  }

  // ── Build a team fixture table ─────────────────────────────────────
  function buildTeamTab(key, teamData) {
    const withByes = insertByes(teamData.matches);
    const nextMatch = withByes.find(m => !m.bye && !m.res);
    let nextInfo = '';
    if (nextMatch) {
      const haWord = nextMatch.ha === 'H' ? 'Home' : 'Away';
      nextInfo = `Next: R${nextMatch.rnd} · ${nextMatch.date} · vs ${nextMatch.opp} · ${haWord} · ${nextMatch.time}`;
    }

    let rows = '';
    for (const m of withByes) {
      if (m.bye) {
        rows += `<tr class="row-bye"><td>R${m.rnd}</td><td colspan="6" style="text-align:center">— BYE —</td><td></td></tr>`;
        continue;
      }
      const isNext = nextMatch && m === nextMatch;
      const nextTag = isNext ? ' <span class="next-tag">Next</span>' : '';
      const rowClass = isNext ? ' class="row-next"' : '';
      rows += `
        <tr${rowClass}>
          <td>R${m.rnd}</td>
          <td>${m.date}</td>
          <td>${m.time}</td>
          <td>${haBadge(m.ha)}</td>
          <td>${m.opp}${nextTag}</td>
          <td class="hide-mobile">${m.venue}</td>
          <td>${scoreCell(m.score, m.res)}</td>
          <td>${resultBadge(m.res)}</td>
        </tr>`;
    }

    return `
      ${buildRecordBar(withByes, nextInfo)}
      <table>
        <thead><tr>
          <th>Rnd</th><th>Date</th><th>Time</th><th>H/A</th><th>Opponent</th>
          <th class="hide-mobile">Venue</th><th>Score</th><th>Result</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ── Build the combined calendar view ──────────────────────────────
  function buildCalendar(teamsData) {
    const TEAM_KEYS = ['harrigan','women','u18','ollt1','ollt2'];
    const TEAM_EMOJIS = { harrigan:'🏆', women:'👩', u18:'🟡', ollt1:'🔵', ollt2:'🟢' };

    // Flatten all matches with team info
    let all = [];
    for (const key of TEAM_KEYS) {
      const td = teamsData[key];
      if (!td) continue;
      for (const m of td.matches) {
        all.push({ ...m, teamKey: key, teamName: td.name });
      }
    }

    // Sort by sortKey then time
    all.sort((a, b) => a.sortKey.localeCompare(b.sortKey));

    // Find global next upcoming match
    const upcoming = all.filter(m => !m.res);
    upcoming.sort((a, b) => a.sortKey.localeCompare(b.sortKey));
    const nextSortKey = upcoming.length ? upcoming[0].sortKey : null;
    let nextUsed = false;

    let rows = '';
    let lastDate = null;

    for (const m of all) {
      if (m.date !== lastDate) {
        rows += `<tr class="cal-date-header"><td colspan="8">${m.date}</td></tr>`;
        lastDate = m.date;
      }
      const isNext = !nextUsed && nextSortKey && m.sortKey === nextSortKey && !m.res;
      if (isNext) nextUsed = true;
      const rowClass = isNext ? ' class="row-next"' : '';
      const nextTag = isNext ? ' <span class="next-tag">Next</span>' : '';
      rows += `
        <tr${rowClass}>
          <td></td>
          <td>${m.time}</td>
          <td><span class="team-badge team-${m.teamKey}">${m.teamName}</span></td>
          <td>${haBadge(m.ha)}</td>
          <td>${m.opp}${nextTag}</td>
          <td>${m.rndName || 'R' + m.rnd}</td>
          <td>${scoreCell(m.score, m.res)}</td>
          <td>${resultBadge(m.res)}</td>
        </tr>`;
    }

    return `
      <table>
        <thead><tr>
          <th>Date</th><th>Time</th><th>Team</th><th>H/A</th><th>Opponent</th>
          <th>Round</th><th>Score</th><th>Result</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ── Main: load data.json and render ───────────────────────────────
  async function init() {
    try {
      const resp = await fetch('./data.json?t=' + Date.now());
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      document.getElementById('last-updated').textContent =
        'Last updated: ' + (data.lastUpdated || 'unknown');

      const keys = ['harrigan','women','u18','ollt1','ollt2'];
      for (const key of keys) {
        const td = data.teams[key];
        if (td) {
          document.getElementById('tab-' + key).innerHTML = buildTeamTab(key, td);
        }
      }

      document.getElementById('tab-calendar').innerHTML = buildCalendar(data.teams);

    } catch (err) {
      console.error(err);
      document.getElementById('tab-calendar').innerHTML =
        `<div class="error-msg">Could not load draw data. Try refreshing the page. (${err.message})</div>`;
      document.getElementById('last-updated').textContent = 'Data unavailable';
    }
  }

  init();
</script>
</body>
</html>
